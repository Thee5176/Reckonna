# PROPOSED ci.yml (fixes the first CI run). Injection-safe. Apply with:
#     mv docs/ci-workflow.proposed.yml .github/workflows/ci.yml && git add -A && git commit && git push
# Fixes: guard go/e2e for the empty module (skip→pass until code lands); gitleaks needs GITHUB_TOKEN;
# Sonar gated behind repo var SONAR_ENABLED (set it + Vault AppRole later) so it's not a false-red.
# ---------------------------------------------------------------------------------------------------
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Go build · test -race · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - id: detect
        run: |
          if [ -n "$(go list ./... 2>/dev/null)" ]; then echo "has_go=true" >> "$GITHUB_OUTPUT";
          else echo "has_go=false" >> "$GITHUB_OUTPUT"; echo "No Go packages yet — skipping build/test/lint"; fi
      - if: steps.detect.outputs.has_go == 'true'
        run: go build ./...
      - if: steps.detect.outputs.has_go == 'true'
        run: go test ./... -race
      - if: steps.detect.outputs.has_go == 'true'
        uses: golangci/golangci-lint-action@v6
        with: { version: v1.62.2 }

  frontend:
    name: Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - run: npm ci || npm install
      - run: npm test -- --watchAll=false --passWithNoTests

  e2e:
    name: E2E (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - id: detect
        run: |
          if [ -n "$(go list -tags e2e ./e2e/... 2>/dev/null)" ]; then echo "has_e2e=true" >> "$GITHUB_OUTPUT";
          else echo "has_e2e=false" >> "$GITHUB_OUTPUT"; echo "No e2e packages yet — skipping"; fi
      - if: steps.detect.outputs.has_e2e == 'true'
        run: go test -tags e2e ./e2e/... -count=1

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.8" }
      - run: terraform -chdir=infra init -backend=false
      - run: terraform -chdir=infra fmt -check -recursive
      - run: terraform -chdir=infra validate

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sonar:
    name: SonarQube
    if: ${{ vars.SONAR_ENABLED == 'true' }}   # set the repo var + Vault AppRole to enable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Fetch Sonar token from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/ci/sonar token | SONAR_TOKEN
      - uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
