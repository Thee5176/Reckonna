# SonarCloud Automatic Analysis config.
#
# Autoscan (the "SonarCloud Code Analysis" check) reads THIS file — not
# sonar-project.properties, which the self-hosted SonarQube CI scan uses.
#
# Exclude the quality-gate FIXTURES under tests/qualitygate/. tests/qualitygate/bad
# violates rules on purpose (cognitive complexity, a deliberate SQL-injection, weak RNG,
# etc.) as the input that proves the gate itself works — it must never count against the
# real project's Quality Gate on New Code. tests/qualitygate/good is its clean counterpart.
sonar.exclusions=tests/qualitygate/**,**/*_gen.go,**/mocks/**,**/node_modules/**,**/.terraform/**
