# sqlc — DB-first codegen (mirrors the old jOOQ workflow). Schema = migrations; queries = db/query.
# Money maps to shopspring/decimal (NUMERIC), ids to google/uuid. pgx/v5 driver. (plan 00 S2 / plan 01 S5)
version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migration"
    queries: "db/query"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
