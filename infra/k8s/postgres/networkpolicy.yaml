apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pg-postgres
  namespace: postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the Tailscale Operator's proxy pods (in the 'tailscale' namespace)
    # are allowed to reach Postgres on 5432. Tailnet-side ACLs gate WHO can
    # reach the proxy in the first place.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
        # n8n shares this Postgres (pre-existing live coupling). Codified here so a
        # reapply does not cut n8n's DB access. Revisit if n8n is decoupled from this DB.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: n8n
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # DNS to kube-dns.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Vault Agent talks to the Vault server during init.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
