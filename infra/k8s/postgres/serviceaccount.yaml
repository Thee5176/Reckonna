apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: postgres
  annotations:
    # Bound to the Vault Kubernetes auth role 'reckonna-postgres' which is
    # configured server-side (Vault) to read 'secret/app/database'. The role
    # is created out-of-band by the platform admin; this manifest does not
    # write any secret. See docs/postgres-tailnet.md "Vault role setup".
    vault.hashicorp.com/role: reckonna-postgres
