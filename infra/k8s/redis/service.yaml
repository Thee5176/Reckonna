apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  annotations:
    # Tailscale Operator picks up these annotations and provisions a proxy pod
    # in the 'tailscale' namespace that registers a MagicDNS device named
    # 'redis-reckonna'. Reachable only by machines that joined our tailnet.
    # No DNS leak, no public route.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "redis-reckonna"
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
