apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: redis
  annotations:
    # Bound to the Vault Kubernetes auth role 'reckonna-redis' which is
    # configured server-side (Vault) to read 'secret/app/redis'. The role
    # is created out-of-band by the platform admin; this manifest does not
    # write any secret. See docs/redis-tailnet.md "Vault role setup".
    vault.hashicorp.com/role: reckonna-redis
