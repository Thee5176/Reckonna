apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tailscale
# The operator is installed via Helm (see operator-values.yaml). This kustomization
# only carries the Vault-injected OAuth Secret manifest and any cluster-scoped
# resources we want under Git control.
# Namespace is owned by Terraform (infra/tailscale.tf). kustomize does not declare it
# to avoid `terraform apply` vs `kubectl apply -k` drift on labels/annotations.
resources:
  - operator-oauth-secret.yaml
