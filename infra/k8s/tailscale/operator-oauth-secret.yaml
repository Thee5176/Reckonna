apiVersion: v1
kind: Secret
metadata:
  name: operator-oauth
  namespace: tailscale
  annotations:
    # The Vault Agent Injector populates client_id + client_secret at
    # install time. The values originate from Vault at:
    #   secret/app/tailscale/operator
    # No literal credential lives in this manifest. CI's gitleaks gate
    # rejects any commit that adds one.
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "reckonna-tailscale-operator"
    vault.hashicorp.com/agent-inject-secret-client_id: "secret/data/app/tailscale/operator"
    vault.hashicorp.com/agent-inject-template-client_id: |
      {{- with secret "secret/data/app/tailscale/operator" -}}
      {{ .Data.data.client_id }}
      {{- end }}
    vault.hashicorp.com/agent-inject-secret-client_secret: "secret/data/app/tailscale/operator"
    vault.hashicorp.com/agent-inject-template-client_secret: |
      {{- with secret "secret/data/app/tailscale/operator" -}}
      {{ .Data.data.client_secret }}
      {{- end }}
type: Opaque
# Empty data block: the operator chart reads existingOAuthSecret -> values are
# expected to be supplied out-of-band before helm install. Two supported paths:
#   1. Vault Agent Injector renders /vault/secrets/* and a small init job
#      patches this Secret on first install (see docs).
#   2. Operator-team admin runs `vault kv get -mount=secret app/tailscale/operator`
#      and applies a one-shot patch via `kubectl patch secret`.
data: {}
