apiVersion: v1
kind: ServiceAccount
metadata:
  name: collector
  namespace: otel
  annotations:
    # Bound to the Vault Kubernetes auth role 'reckonna-otel-collector' which
    # is configured server-side (Vault) to read 'secret/app/otel/exporter'.
    # The role is created out-of-band by the platform admin; this manifest
    # does not write any secret. See docs/otel-collector.md.
    vault.hashicorp.com/role: reckonna-otel-collector
