apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector
  namespace: otel
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: telemetry
data:
  # Collector pipeline: otlp recv (4317 gRPC + 4318 HTTP) -> memory_limiter ->
  # batch -> otlp exporter (gRPC, TLS) to an external backend.
  #
  # The exporter endpoint and Authorization header are NEVER literal in this
  # file. They are sourced from Vault via the Vault Agent Injector annotations
  # on the DaemonSet (S7), which renders /vault/secrets/otel.env that the
  # entrypoint sources before exec'ing the collector. ${env:VAR} substitution
  # picks them up at startup.
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      otlp:
        endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
        headers:
          authorization: ${env:OTEL_EXPORTER_OTLP_HEADERS}
        tls:
          insecure: false

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp]
      telemetry:
        logs:
          level: info
