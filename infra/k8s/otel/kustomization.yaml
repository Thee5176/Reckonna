apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: otel
commonLabels:
  app.kubernetes.io/part-of: reckonna
  app.kubernetes.io/component: telemetry
# Namespace is owned by Terraform (infra/otel.tf). kustomize does not declare it
# to avoid `terraform apply` vs `kubectl apply -k` drift on labels/annotations.
resources:
  - serviceaccount.yaml
  - configmap.yaml
  - daemonset.yaml
  - service.yaml
  - networkpolicy.yaml
