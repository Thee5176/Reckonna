# Reckonna gitleaks config — CI secret-scan gate (plan 00 S8). Extends the default ruleset.
title = "Reckonna gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Reckonna allowlist — files that legitimately contain secret-shaped but non-secret text"
paths = [
  '''tests/no-secrets_test\.sh''',        # assembles FAKE secrets at runtime; contains no literal secret
  '''\.devcontainer/post-create\.sh''',   # tool download URLs only, no credentials
  '''locales/.*\.json''',                 # account-name translations
]
