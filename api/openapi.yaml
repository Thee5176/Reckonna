openapi: 3.0.3
info:
  title: Reckonna Accounting CQRS API
  description: >
    Double-ledger accounting system. Command side writes journal entries under
    optimistic concurrency + opt-in idempotency; query side is strictly
    read-only and owner-scoped. Grounded in the plan-03 implementation
    (internal/handler/command, internal/handler/query) — see
    plans/03-backend-cqrs-core.md "API Conventions" for the source of truth
    this spec mirrors.
  version: "1.0.0"
servers:
  - url: /
    description: >
      Relative root. In deployment the command service and query service are
      separate processes (each defaulting to :8080), reverse-proxied under
      their respective /command and /query path prefixes already present in
      every path below.

security:
  - bearerAuth: []

tags:
  - name: command
    description: Write side — journal entry create/update/delete.
  - name: query
    description: Read side — owner-scoped, strictly read-only.
  - name: health
    description: Unauthenticated liveness checks.

paths:
  /command/journal-entries:
    post:
      tags: [command]
      summary: Create a journal entry
      description: >
        Owner comes from the JWT `sub`, never the body. `book` is implicit
        (`base`, v1 has no other book). Opt-in idempotency via
        `Idempotency-Key`: same key + same owner + same body replays the
        cached 201; same key + different body → 422 duplicate_idempotency_key.
      operationId: createJournalEntry
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryCreateRequest'
      responses:
        '201':
          description: Created
          headers:
            ETag:
              description: Strong ETag carrying the new version, e.g. `"1"`.
              schema: { type: string }
            Location:
              description: Path of the created entry.
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/ServerError'

  /command/journal-entries/{id}:
    parameters:
      - $ref: '#/components/parameters/EntryId'
    put:
      tags: [command]
      summary: Replace a journal entry under optimistic concurrency
      description: >
        `If-Match` is mandatory (missing → 428, forces clients to opt into
        concurrency control). A stale version → 409 with the current version
        in the body.
      operationId: updateJournalEntry
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryCreateRequest'
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              description: Strong ETag carrying the new version.
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Optimistic-concurrency conflict — `If-Match` version is stale.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          description: Precondition Required — `If-Match` header missing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [command]
      summary: Delete a journal entry and its lines
      operationId: deleteJournalEntry
      responses:
        '204':
          description: Deleted, no body.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /command/health:
    get:
      tags: [health]
      summary: Command service liveness check
      operationId: commandHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /query/journal-entries:
    get:
      tags: [query]
      summary: List owner-scoped journal entries (cursor-paginated)
      operationId: listJournalEntries
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/journal-entries/{id}:
    parameters:
      - $ref: '#/components/parameters/EntryId'
    get:
      tags: [query]
      summary: Get one owner-scoped journal entry with its lines
      description: >
        Not owned or not existing are indistinguishable — both return 404
        (enumeration defense).
      operationId: getJournalEntry
      responses:
        '200':
          description: OK
          headers:
            ETag:
              description: Strong ETag carrying the entry's current version.
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/journal-lines/{id}:
    parameters:
      - $ref: '#/components/parameters/EntryId'
    get:
      tags: [query]
      summary: Get the lines of one owner-scoped journal entry
      operationId: getJournalLines
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalLinesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/accounts:
    get:
      tags: [query]
      summary: List the active chart of accounts
      operationId: listAccounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/balances:
    get:
      tags: [query]
      summary: Outstanding balances for the given accounts
      description: >
        Repeated `?account=` query param, 1..50 codes. Empty → 400
        validation_failed (no implicit "all accounts").
      operationId: getBalances
      parameters:
        - $ref: '#/components/parameters/AccountCodes'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/statements/balance-sheet:
    get:
      tags: [query]
      summary: Owner-scoped balance sheet
      description: Asserts the accounting identity Assets == Liabilities + Equity.
      operationId: getBalanceSheet
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceSheetView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/statements/profit-loss:
    get:
      tags: [query]
      summary: Owner-scoped profit-and-loss statement
      operationId: getProfitLoss
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitLossView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /query/health:
    get:
      tags: [health]
      summary: Query service liveness check
      operationId: queryHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak-issued OIDC access token; owner scoping keys off the `sub` claim.

  parameters:
    EntryId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      required: false
      description: Page size, 1..200. Default 50 server-side; a negative value is rejected.
      schema: { type: integer, minimum: 0, maximum: 200, default: 50 }
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque base64url-encoded UUIDv7 cursor from a prior page's `next_cursor`.
      schema: { type: string }
    AccountCodes:
      name: account
      in: query
      required: true
      description: Repeatable 5-digit account code. 1..50 per request.
      style: form
      explode: true
      schema:
        type: array
        minItems: 1
        maxItems: 50
        items: { type: integer, minimum: 10000, maximum: 99999 }
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: >
        The entry's current version, quoted or bare (e.g. `"3"`). Mandatory
        for PUT in practice — omitting it returns 428.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-generated UUIDv4. Opt-in; omit for a normal (non-idempotent) POST.
      schema: { type: string, format: uuid }
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Selects the locale for Problem `title`/`detail` (`code` stays locale-neutral).
      schema: { type: string }

  responses:
    BadRequest:
      description: Syntactic error (malformed JSON, missing/invalid field, invalid cursor).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Token's `sub` does not own this resource (write ops only).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found, or not visible to the caller (not distinguished — enumeration defense).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnsupportedMediaType:
      description: Request `Content-Type` is not `application/json` on POST/PUT.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Business-rule violation (unbalanced entry, mixed currency, missing required dimension, unknown account code, malformed Idempotency-Key replay).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ServerError:
      description: Unclassified server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      type: object
      description: RFC 7807 Problem Details. Tests assert on `code` + `status`, never on localized `title`/`detail`.
      required: [type, title, status, code, detail, instance]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        code:
          type: string
          enum:
            - unbalanced_entry
            - mixed_currency
            - missing_required_dimension
            - unknown_account_code
            - invalid_cursor
            - concurrency_conflict
            - duplicate_idempotency_key
            - unsupported_media_type
            - unauthorized
            - forbidden
            - not_found
            - validation_failed
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        current_version:
          type: integer
          nullable: true
          description: Populated on 409 concurrency_conflict — the entry's current version.

    FieldError:
      type: object
      properties:
        line_index:
          type: integer
          nullable: true
        field:
          type: string
        issue:
          type: string

    JournalLineInput:
      type: object
      required: [account_code, side, amount]
      properties:
        account_code:
          type: integer
          description: 5-digit chart-of-accounts code.
        side:
          type: string
          enum: [debit, credit]
        amount:
          type: string
          description: Non-negative decimal, as a string to preserve precision.
        dimensions:
          type: object
          additionalProperties:
            type: string
          description: e.g. `{"currency":"JPY"}`. Required dimensions vary per account.

    JournalEntryCreateRequest:
      type: object
      required: [date, description, lines]
      properties:
        date:
          type: string
          format: date
        description:
          type: string
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/JournalLineInput'

    JournalEntryCreateResponse:
      type: object
      required: [id, version]
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer

    JournalLineView:
      type: object
      required: [account_code, side, amount, line_no]
      properties:
        account_code:
          type: integer
        side:
          type: string
          enum: [debit, credit]
        amount:
          type: string
        line_no:
          type: integer

    JournalEntryView:
      type: object
      required: [id, date, description, version]
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        description:
          type: string
        version:
          type: integer
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLineView'

    JournalEntryPage:
      type: object
      required: [items, has_more]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JournalEntryView'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    JournalLinesResponse:
      type: object
      required: [id, lines]
      properties:
        id:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLineView'

    AccountView:
      type: object
      required: [code, name, type, normal_balance, postable, status]
      properties:
        code:
          type: integer
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [asset, liability, equity, income, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        postable:
          type: boolean
        ifrs_line_item:
          type: string
        status:
          type: string

    AccountsResponse:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountView'

    BalanceView:
      type: object
      required: [account_code, account_name, balance]
      properties:
        account_code:
          type: integer
        account_name:
          type: string
        balance:
          type: string

    BalancesResponse:
      type: object
      required: [balances]
      properties:
        balances:
          type: array
          items:
            $ref: '#/components/schemas/BalanceView'

    LineBalance:
      type: object
      required: [code, name, balance]
      properties:
        code:
          type: integer
        name:
          type: string
        balance:
          type: string

    BalanceSheetView:
      type: object
      required: [assets, liabilities, equity, total_assets, total_liabilities_and_equity, balanced]
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/LineBalance'
        liabilities:
          type: array
          items:
            $ref: '#/components/schemas/LineBalance'
        equity:
          type: array
          items:
            $ref: '#/components/schemas/LineBalance'
        total_assets:
          type: string
        total_liabilities_and_equity:
          type: string
        balanced:
          type: boolean

    ProfitLossView:
      type: object
      required: [income, expense, revenue, expenses, net_income]
      properties:
        income:
          type: array
          items:
            $ref: '#/components/schemas/LineBalance'
        expense:
          type: array
          items:
            $ref: '#/components/schemas/LineBalance'
        revenue:
          type: string
        expenses:
          type: string
        net_income:
          type: string

    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string
