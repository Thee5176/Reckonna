sonar.projectKey=reckonna
sonar.projectName=Reckonna (Accounting CQRS)
# sonar.host.url intentionally omitted — the scanner reads SONAR_HOST_URL
# from the environment (set in .github/workflows/ci.yml or by the local dev
# run script) so internal vs external endpoints stay configurable in one place.
sonar.sources=cmd,internal,app,components,infra
sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,e2e/**
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=**/*_gen.go,**/mocks/**,**/node_modules/**,**/.terraform/**

# Block the scan on the Quality Gate result so CI (push AND pull_request) is
# actually GATED, not just uploaded. The scanner submits the analysis, polls the
# gate, and exits non-zero if it's red — failing the `sonar` job and the PR.
# timeout guards against the analysis-report queue stalling on a busy server.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# NOTE on pull-request analysis: the homelab SonarQube is Community Build, which
# has no native branch/PR analysis. A pull_request-triggered scan is evaluated
# against the project's New Code (still a real gate on the PR's changes). True
# per-PR isolation + PR decoration requires the community branch plugin
# (mc1arke/sonarqube-community-branch-plugin) on the server; the CI workflow then
# passes sonar.pullrequest.* params, gated behind repo var SONAR_BRANCH_PLUGIN.
