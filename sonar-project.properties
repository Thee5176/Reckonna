sonar.projectKey=reckonna
sonar.projectName=Reckonna (Accounting CQRS)
# sonar.host.url intentionally omitted — the scanner reads SONAR_HOST_URL
# from the environment (set in .github/workflows/ci.yml or by the local dev
# run script) so internal vs external endpoints stay configurable in one place.
sonar.sources=cmd,internal,app,components,infra
sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,e2e/**
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sqlc names its output db.go/models.go/querier.go/*.sql.go (not *_gen.go), so
# it needs its own patterns here. This is generated boilerplate mirrored
# between internal/repository/{command,query} by design (the CQRS read/write
# split — see CLAUDE.md "Package layout") — not accidental duplication to
# refactor away, and not hand-editable in the first place.
sonar.exclusions=**/*_gen.go,internal/repository/*/db.go,internal/repository/*/models.go,internal/repository/*/querier.go,internal/repository/*/*.sql.go,**/mocks/**,**/node_modules/**,**/.terraform/**
